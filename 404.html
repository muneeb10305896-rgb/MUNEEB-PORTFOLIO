<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Muneeb Ahmed Butt</title>
<meta name="description" content="The page you're looking for doesn't exist.">
<meta name="theme-color" content="#07070f">
<link rel="preload" href="assets/fonts/DMSans-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/Syne-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070f; --accent: #7c6dfa; --accent2: #4fc3f7; --accent3: #ff6b9d;
  --text: #f0eef8; --muted: #7a789a; --card: #0f0f1c; --border: rgba(124,109,250,0.15);
}
html[data-theme="light"] {
  --bg: #f3f2fb; --text: #1c1832; --muted: #5d5a7c; --card: #fff; --border: rgba(94,82,221,0.18);
}
html[data-accent="teal"] { --accent: #0ec8b0; --accent2: #6ee7b7; --accent3: #34d399; --border: rgba(14,200,176,0.15); }
html[data-accent="rose"] { --accent: #f472b6; --accent2: #fb7185; --accent3: #f43f5e; --border: rgba(244,114,182,0.15); }
html[data-accent="amber"] { --accent: #fbbf24; --accent2: #f59e0b; --accent3: #d97706; --border: rgba(251,191,36,0.15); }
html { font-size: 16px; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; line-height: 1.7;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: -20%; z-index: -2; pointer-events: none;
  background:
    radial-gradient(40% 40% at 20% 25%, rgba(124,109,250,.20), transparent 60%),
    radial-gradient(35% 35% at 80% 30%, rgba(79,195,247,.16), transparent 60%),
    radial-gradient(45% 45% at 60% 80%, rgba(255,107,157,.14), transparent 60%);
}
.container {
  text-align: center; padding: 2rem; max-width: 500px;
  animation: fadeUp .6s ease-out;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.error-code {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(5rem, 12vw, 8rem);
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1; margin-bottom: .5rem;
}
.error-sub {
  font-size: 1.2rem; font-weight: 600; margin-bottom: .5rem;
  font-family: 'Syne', sans-serif;
}
.error-desc {
  color: var(--muted); font-size: .9rem; margin-bottom: 2rem;
}
.home-btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .75rem 1.75rem; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #9b8df8);
  color: #fff; font-weight: 600; text-decoration: none;
  font-size: .9rem; transition: all .25s;
  box-shadow: 0 4px 20px rgba(124,109,250,.3);
}
.home-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,109,250,.5); }
.home-btn svg { transition: transform .2s; }
.home-btn:hover svg { transform: translateX(-3px); }
.back-icon { display: inline-block; }
.resume-link {
  display: block; margin-top: 1.2rem;
  color: var(--muted); font-size: .83rem; text-decoration: none;
  transition: color .2s;
}
.resume-link:hover { color: var(--accent); }

@media (prefers-reduced-motion: reduce) {
  .container { animation: none; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  var a = localStorage.getItem('accent');
  if (a) document.documentElement.setAttribute('data-accent', a);
})();
</script>
</head>
<body>
<div class="container">
  <div class="error-code">404</div>
  <div class="error-sub">Page Not Found</div>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
  <a class="home-btn" href="/">
    <svg class="back-icon" viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 18l-7-7 7-7M3 11h17"/></svg>
    Back to Home
  </a>
  <a class="resume-link" href="/resume.html">View my resume &rarr;</a>
</div>
</body>
</html>
